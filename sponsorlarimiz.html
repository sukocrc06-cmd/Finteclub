    <!-- Page Header Section -->
    <section class="sponsors-header" style="padding-top: 140px; text-align: center;">

        <hr style="width: 60%; border: none; border-top: 2px solid rgba(255,255,255,0.1); margin: 20px auto 30px auto;">

    <!-- Modern Sponsor Showcase -->
    <section class="sponsors-content">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 60px 20px; max-width: 1000px; margin: 0 auto;">
            
            <!-- Card 1 -->
            <div class="sponsor-card">

                <span style="color: #1e293b; font-weight: 600; font-size: 1.1rem;">AvukatApp</span>
            </div>

            <!-- Card 4 -->
            <div class="sponsor-card" style="flex-direction: column; gap: 10px;">
                <img src="muhammet-kasap.jpeg" alt="Muhammet Kasap Logo" style="max-width: 100%; max-height: 70%; object-fit: contain; border-radius: 50%;">
                <span style="color: #1e293b; font-weight: 600; font-size: 1.1rem;">Muhammet Kasap</span>

        </div>
